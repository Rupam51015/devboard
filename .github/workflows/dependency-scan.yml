# Goal: I have to ensure the packages and dependencies are audited for security
name: Dependency Scan
on:
  workflow_call:
jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          go-version-file: ./backend/go.mod
          cache-dependency-path: ./backend/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run Scan
        continue-on-error: true
        run: govulncheck ./... > go-vuln-report.txt
        working-directory: ./backend

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run dependency scan for Node.js
        run: npm audit
        working-directory: frontend

      - name: Update vul-check to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Go-vuln-report
          path: go-vuln-report.txt
          retention-days: 5