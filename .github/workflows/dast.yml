# Goal: To ensure my running application is free from OWASP top 10 security issues
name: DAST
on:
  workflow_call:
jobs:
  ZAP-Scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Wait for services to be healthy
        run: |
          timeout 60s sh -c 'until curl -s http://${{ secrets.EC2_HOST }}:8080 > /dev/null; do sleep 2; done'

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://${{ secrets.EC2_HOST }}:8080'
          fail_action: false
          allow_issue_writing: false 